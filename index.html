<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guncel Is Ilanlari</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; color: #333; }
        header { background-color: #2c3e50; color: white; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        header h1 { margin: 0; font-size: 22px; }
        header p { margin: 5px 0 0 0; font-size: 14px; color: #bdc3c7; }

        .filtreler {
            background: #34495e;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            align-items: flex-end;
        }
        .filtre-grup {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filtre-grup label {
            color: #bdc3c7;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filtre-grup select,
        .filtre-grup input {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #5d6d7e;
            background: #2c3e50;
            color: white;
            font-size: 14px;
            min-width: 160px;
            cursor: pointer;
        }
        .filtre-grup select:focus,
        .filtre-grup input:focus {
            outline: none;
            border-color: #3498db;
        }
        .filtre-grup input::placeholder { color: #7f8c8d; }
        .filtre-btn {
            padding: 8px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .filtre-btn:hover { background: #2980b9; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .sonuc-bilgi {
            text-align: center;
            color: #7f8c8d;
            font-size: 13px;
            margin-bottom: 15px;
            padding: 8px;
            background: white;
            border-radius: 8px;
        }
        .ilan-karti { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #3498db; }
        .ilan-baslik { font-size: 17px; font-weight: bold; color: #2c3e50; margin: 0 0 6px 0; }
        .ilan-aciklama { font-size: 13px; color: #555; margin-bottom: 10px; line-height: 1.4; }
        .detaylar { display: flex; justify-content: space-between; align-items: center; font-size: 13px; flex-wrap: wrap; gap: 6px; }
        .konum-badge { background-color: #e8f4f8; color: #2980b9; padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 12px; }
        .kaynak-badge { background-color: #eafaf1; color: #27ae60; padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 11px; }
        .tarih { color: #e74c3c; font-weight: bold; font-size: 12px; }
        .link-buton { display: block; text-align: center; background-color: #3498db; color: white; text-decoration: none; padding: 10px; border-radius: 8px; margin-top: 12px; font-weight: bold; transition: background 0.2s; }
        .link-buton:hover { background-color: #2980b9; }
        .bos-mesaj { text-align: center; padding: 40px 20px; color: #7f8c8d; }

        @media (max-width: 480px) {
            .filtreler { flex-direction: column; align-items: stretch; }
            .filtre-grup select, .filtre-grup input { min-width: auto; width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Is Ilani Arama</h1>
        <p id="son-guncelleme">Ilanlar yukleniyor...</p>
    </header>

    <div class="filtreler" id="filtre-alani">
        <p style="color: #bdc3c7; text-align: center; width: 100%;">Filtreler yukleniyor...</p>
    </div>

    <div class="container" id="ilan-konteyner">
        <p style="text-align:center;">Ilanlar yukleniyor...</p>
    </div>

    <script>
        let tumIlanlar = [];
        let konfig = null;

        Promise.all([
            fetch('config.json').then(c => c.json()),
            fetch('ilanlar.json').then(c => c.json()).catch(function() { return []; })
        ])
        .then(function(sonuclar) {
            konfig = sonuclar[0];
            tumIlanlar = sonuclar[1];
            filtreleriOlustur(konfig);
            ilanlariGoster(tumIlanlar);
        })
        .catch(function(hata) {
            console.error("Hata:", hata);
            document.getElementById('ilan-konteyner').innerHTML =
                "<p class='bos-mesaj'>Veriler yuklenemedi. Lutfen sayfayi yenileyin.</p>";
        });

        function filtreleriOlustur(konf) {
            var alan = document.getElementById('filtre-alani');

            // Pozisyon secici
            var pozOps = '';
            konf.pozisyonlar.forEach(function(p) {
                var secili = p === konf.secili_pozisyon ? 'selected' : '';
                var gorunen = p.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
                pozOps += '<option value="' + p + '" ' + secili + '>' + gorunen + '</option>';
            });

            // Sehir secici
            var sehirOps = '';
            konf.sehirler.forEach(function(s) {
                var secili = s === konf.secili_sehir ? 'selected' : '';
                var gorunen = s.charAt(0).toUpperCase() + s.slice(1);
                sehirOps += '<option value="' + s + '" ' + secili + '>' + gorunen + '</option>';
            });

            // Kaynak filtreleme (mevcut ilanlardaki kaynaklardan)
            var kaynaklar = [];
            tumIlanlar.forEach(function(ilan) {
                if (ilan.kaynak && kaynaklar.indexOf(ilan.kaynak) === -1) {
                    kaynaklar.push(ilan.kaynak);
                }
            });
            kaynaklar.sort();

            var kaynakOps = '<option value="tumu">Tum Kaynaklar</option>';
            kaynaklar.forEach(function(k) {
                kaynakOps += '<option value="' + k + '">' + k + '</option>';
            });

            alan.innerHTML =
                '<div class="filtre-grup">' +
                    '<label>Pozisyon</label>' +
                    '<select id="pozisyon-sec">' + pozOps + '</select>' +
                '</div>' +
                '<div class="filtre-grup">' +
                    '<label>Sehir</label>' +
                    '<select id="sehir-sec">' + sehirOps + '</select>' +
                '</div>' +
                '<div class="filtre-grup">' +
                    '<label>Kaynak</label>' +
                    '<select id="kaynak-sec">' + kaynakOps + '</select>' +
                '</div>' +
                '<div class="filtre-grup">' +
                    '<label>Anahtar Kelime</label>' +
                    '<input type="text" id="arama-kutusu" placeholder="Filtrele...">' +
                '</div>' +
                '<button class="filtre-btn" onclick="filtreUygula()">Filtrele</button>';

            // Enter ile de filtre calissin
            document.getElementById('arama-kutusu').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') filtreUygula();
            });
        }

        function filtreUygula() {
            var seciliKaynak = document.getElementById('kaynak-sec').value;
            var aramaMetni = document.getElementById('arama-kutusu').value.toLowerCase().trim();

            var filtrelenmis = tumIlanlar.filter(function(ilan) {
                // Kaynak filtresi
                if (seciliKaynak !== 'tumu' && ilan.kaynak !== seciliKaynak) {
                    return false;
                }
                // Anahtar kelime filtresi
                if (aramaMetni) {
                    var metin = (ilan.baslik + ' ' + (ilan.aciklama || '') + ' ' + ilan.kaynak).toLowerCase();
                    if (metin.indexOf(aramaMetni) === -1) {
                        return false;
                    }
                }
                return true;
            });

            ilanlariGoster(filtrelenmis);
        }

        function ilanlariGoster(ilanListesi) {
            var konteyner = document.getElementById('ilan-konteyner');
            konteyner.innerHTML = '';

            if (!ilanListesi || ilanListesi.length === 0) {
                konteyner.innerHTML = "<p class='bos-mesaj'>Ilan bulunamadi.</p>";
                document.getElementById('son-guncelleme').innerText = 'Sonuc yok';
                return;
            }

            // Tarihe gore sirala
            ilanListesi.sort(function(a, b) { return new Date(b.tarih) - new Date(a.tarih); });

            // Sonuc bilgisi
            var bilgi = document.createElement('div');
            bilgi.className = 'sonuc-bilgi';
            bilgi.textContent = 'Toplam ' + ilanListesi.length + ' ilan bulundu';
            konteyner.appendChild(bilgi);

            ilanListesi.forEach(function(ilan) {
                var kart = document.createElement('div');
                kart.className = 'ilan-karti';

                var aciklamaHtml = ilan.aciklama ? '<p class="ilan-aciklama">' + escapeHtml(ilan.aciklama) + '</p>' : '';
                var kaynakBadge = ilan.kaynak ? '<span class="kaynak-badge">' + escapeHtml(ilan.kaynak) + '</span>' : '';

                kart.innerHTML =
                    '<h2 class="ilan-baslik">' + escapeHtml(ilan.baslik) + '</h2>' +
                    aciklamaHtml +
                    '<div class="detaylar">' +
                        '<span class="konum-badge">' + escapeHtml(ilan.konum) + '</span>' +
                        kaynakBadge +
                        '<span class="tarih">' + escapeHtml(ilan.tarih) + '</span>' +
                    '</div>' +
                    '<a href="' + escapeHtml(ilan.link) + '" target="_blank" rel="noopener noreferrer" class="link-buton">Ilana Git</a>';

                konteyner.appendChild(kart);
            });

            var simdi = new Date();
            document.getElementById('son-guncelleme').innerText =
                "Son Guncelleme: " + simdi.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
        }

        function escapeHtml(metin) {
            if (!metin) return '';
            var div = document.createElement('div');
            div.textContent = metin;
            return div.innerHTML;
        }
    </script>
</body>
</html>
