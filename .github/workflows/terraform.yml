name: Gunluk Ilan Tarayici

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Dosyalari Al
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Gerekli Araclari Yukle
        run: pip install ddgs

      - name: Ilanlari Tara
        run: python scraper.py

      - name: Yeni Ilanlari Kaydet
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add ilanlar.json
          git diff --staged --quiet && echo "Degisiklik yok" && exit 0
          git commit -m "Otomatik Guncelleme: Yeni ilanlar eklendi"
          git push
